<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMAH GOZALI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0d0d0d;color:#fff;}

/* ANTI SELECT */
html, body, *{
  user-select:none !important;
  -webkit-user-select:none !important;
  -ms-user-select:none !important;
}
*{-webkit-tap-highlight-color:transparent;}

/* ===== STYLE ASLI ===== */

.header{
  position:relative;
  height:110px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to bottom,#000,#0d0d0d);
  z-index:2;
  flex-direction:column;
}

.title{
  font-family:'Bebas Neue';
  font-size:clamp(2rem,5vw,3.5rem);
  letter-spacing:4px;
}
.title span{color:#E50914;}

/* ===== NETFLIX CLOCK BAR (TAMBAHAN) ===== */
.clock-wrapper{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  justify-content:center;
  align-items:center;
  width:auto;
  pointer-events:none;
}

.clock{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:0.8rem;
  padding:4px 12px;
  border-radius:999px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.1);
}

/* DOT LIVE */
.live-dot{
  width:6px;
  height:6px;
  background:#E50914;
  border-radius:50%;
  box-shadow:0 0 6px #E50914;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1;transform:scale(1);}
  50%{opacity:0.5;transform:scale(1.6);}
  100%{opacity:1;transform:scale(1);}
}

/* TEXT */
.time-text{
  font-weight:500;
  letter-spacing:0.5px;
}

.date{
  opacity:0.6;
  font-size:0.75rem;
}

/* SISANYA TETAP */
.dots{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:20px 0;
  flex-wrap:wrap;
  z-index:2;
  position:relative;
}

.dot{
  padding:10px 22px;
  border-radius:999px;
  background:#222;
  color:#aaa;
  font-size:0.95rem;
  cursor:pointer;
  transition:0.3s;
  border:1px solid transparent;
}
.dot:hover{background:#333;color:#fff;}
.dot.active{
  background:#E50914;
  color:#fff;
  border-color:#E50914;
  transform:scale(1.05);
}

.slider-container{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  position:relative;
  z-index:2;
}
.slider-container::-webkit-scrollbar{display:none;}

.slide{flex:0 0 100%;scroll-snap-align:start;padding:15px;display:grid;gap:15px;}
@media(min-width:768px){.slide{grid-template-columns:1fr 1fr;}}

.card{background:#111;border-radius:12px;padding:10px;}
.card-header{display:flex;justify-content:space-between;align-items:center;}
.card h2{font-family:'Bebas Neue';font-size:1.2rem;}

.refresh-btn{
  padding:6px 14px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.15);
  background:#1a1a1a;
  color:#aaa;
  font-size:0.8rem;
  cursor:pointer;
  transition:all 0.25s ease;
}

.refresh-btn:hover{
  background:#E50914;
  color:#fff;
  border-color:#E50914;
  box-shadow:0 0 10px rgba(229,9,20,0.5);
  transform:translateY(-1px);
}

.refresh-btn:active{
  transform:scale(0.95);
}

.player{
  position:relative;
  width:100%;
  height:500px;
  background:black;
  border-radius:10px;
  overflow:hidden;
}

.player iframe{
  width:100%;
  height:100%;
  border:0;
  display:block;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2;
}

.play-btn{
  background:#E50914;
  padding:10px 20px;
  border-radius:6px;
}

.coming{
  background:rgba(0,0,0,0.9);
  font-family:'Bebas Neue';
  letter-spacing:2px;
  color:#aaa;
}

.spinner{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
}
.spinner:after{
  content:"";
  width:30px;height:30px;
  border:4px solid #fff;
  border-top-color:red;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== UPGRADE ===== */
.card{background:linear-gradient(145deg,#0f0f0f,#1a1a1a);box-shadow:0 10px 25px rgba(0,0,0,0.6);}
.refresh-btn{background:linear-gradient(145deg,#1c1c1c,#111);box-shadow:0 2px 8px rgba(0,0,0,0.5);}
.player{box-shadow:0 10px 25px rgba(0,0,0,0.7);}
.dot{background:linear-gradient(145deg,#1a1a1a,#2a2a2a);}
.dot.active{box-shadow:0 0 10px rgba(229,9,20,0.6);}
.play-btn{box-shadow:0 0 15px rgba(229,9,20,0.7);}
.overlay{backdrop-filter:blur(3px);}

</style>
</head>

<body>

<div class="header">

  <!-- NETFLIX STYLE CLOCK -->
  <div class="clock-wrapper">
    <div class="clock">
      <div class="live-dot"></div>
      <span class="time-text" id="clock"></span>
      <span class="date" id="date"></span>
    </div>
  </div>

  <div class="title">RUMAH <span>GOZALI</span></div>

</div>

<div class="dots" id="dots"></div>
<div class="slider-container" id="sliderContainer"></div>

<script>

function updateClock(){
  const now=new Date();

  const time=now.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
  const date=now.toLocaleDateString("id-ID",{weekday:"short",day:"numeric",month:"short"});

  document.getElementById("clock").innerText=time;
  document.getElementById("date").innerText=date;
}

setInterval(updateClock,1000);
updateClock();

/* SCRIPT ASLI (TIDAK DIUBAH) */
const channelGroups=[{name:"LIVE EVENT",channels:[
{ name:"EVENT 1", url:""},
{ name:"EVENT 2", url:""},
{ name:"EVENT 3", url:""},
{ name:"EVENT 4", url:""},
{ name:"EVENT 5", url:""},
{ name:"EVENT 6", url:""},
{ name:"EVENT 7", url:""},
{ name:"EVENT 8", url:""}]},
{name:"SPORT CHANNEL",channels:[
{ name:"TNT 1", url:"https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D"},
{ name:"TNT 2", url:"https://embed.crichd.tech/embed.php?id=TNTSports2%255BUK%255D"},
{ name:"TNT 3", url:"https://embed.crichd.tech/embed.php?id=TNTSports3%255BUK%255D"},
{ name:"TNT 4", url:"https://embed.crichd.tech/embed.php?id=TNTSports4%255BUK%255D"},
{ name:"Ziggo Sport 1", url:"https://embed.crichd.tech/embed.php?id=ZiggoSport%255BNetherlands%255D"},
{ name:"Fox Sport 1", url:"https://embed.crichd.tech/embed.php?id=FOXSports1%255BUSA%255D"},
{ name:"Ziggo Sport 3", url:"https://embed.crichd.tech/embed.php?id=ZiggoSport3%255BNetherlands%255D"},
{ name:"Bein 1 Arabic", url:"https://embed.crichd.tech/embed.php?id=BeinSports1%255BArab%255D"}]},
{name:"KNOWLEDGE",channels:[
{ name:"DISCOVERY 1", url:""},
{ name:"DISCOVERY 2", url:""},
{ name:"NAT GEO 1", url:""},
{ name:"NAT GEO 2", url:""},
{ name:"HISTORY 1", url:""},
{ name:"HISTORY 2", url:""},
{ name:"ANIMAL PLANET", url:""},
{ name:"SCIENCE", url:""}]}];

const container=document.getElementById("sliderContainer");
const dotsContainer=document.getElementById("dots");

channelGroups.forEach((group,idx)=>{
  const slide=document.createElement("div");
  slide.className="slide";

  group.channels.forEach((ch,i)=>{
    const isEmpty=!ch.url;

    slide.innerHTML+=`
    <div class="card">
      <div class="card-header">
        <h2>${ch.name||"CHANNEL"}</h2>
        <button class="refresh-btn" onclick="refreshFrame('${idx}-${i}')">Refresh</button>
      </div>

      <div class="player">
        <iframe id="${idx}-${i}" data-src="${ch.url}" allowfullscreen></iframe>

        <div class="overlay ${isEmpty?'coming':''}"
        ${isEmpty?'':`onclick="playStream('${idx}-${i}',this)"`}>

        ${isEmpty?'COMING SOON':'<div class="play-btn">▶ Play</div>'}

        </div>

        <div class="spinner" id="sp-${idx}-${i}"></div>
      </div>
    </div>`;
  });

  container.appendChild(slide);

  const dot=document.createElement("div");
  dot.className="dot";
  dot.innerText=group.name;

  if(idx===0) dot.classList.add("active");

  dot.onclick=()=>{
    container.scrollTo({left:container.clientWidth*idx,behavior:"smooth"});
  };

  dotsContainer.appendChild(dot);
});

container.addEventListener("scroll",()=>{
  const index=Math.round(container.scrollLeft/container.clientWidth);
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active",i===index);
  });
});

function playStream(id,overlay){
  const frame=document.getElementById(id);
  const spin=document.getElementById("sp-"+id);

  spin.style.display="flex";
  frame.src=frame.dataset.src;
  frame.onload=()=>spin.style.display="none";

  overlay.style.display="none";
}

function refreshFrame(id){
  const f=document.getElementById(id);
  if(!f.src)return;
  f.src=f.src;
}

</script>

</body>
</html>
