<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rumah Gozali</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* BODY */
body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    padding: 15px;
}

/* HEADER */
.header {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: #e50914;
    letter-spacing: 1px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

/* CARD */
.card {
    background: #111;
    border-radius: 10px;
    padding: 10px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

/* HOVER DESKTOP */
@media (hover: hover) {
    .card:hover {
        transform: scale(1.03);
        box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    }
}

/* TAP HP */
.card:active {
    transform: scale(0.97);
}

/* HEADER CARD */
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* TITLE */
.card h2 {
    font-size: 0.85rem;
    color: #bbb;
}

/* REFRESH */
.refresh-btn {
    background: transparent;
    border: none;
    color: #aaa;
    font-size: 0.9rem;
    cursor: pointer;
}

/* PLAYER */
.player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    background: black;
    margin-top: 6px;
}

/* IFRAME */
.player iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}

.overlay:hover {
    background: rgba(0,0,0,0.5);
}

/* PLAY BUTTON */
.play-btn {
    background: #e50914;
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: 500;
    font-size: 0.85rem;
    transition: 0.2s;
}

/* HOVER PLAY */
@media (hover: hover) {
    .play-btn:hover {
        transform: scale(1.1);
        background: #ff1a1a;
    }
}

/* TAP PLAY */
.play-btn:active {
    transform: scale(0.95);
}

/* DESKTOP GRID */
@media (min-width: 768px) {
    .container {
        grid-template-columns: 1fr 1fr;
    }
}
</style>
</head>

<body>

<div class="header">Rumah Gozali</div>

<div class="container" id="channels"></div>

<script>
const channels = [
    { name: "TNT Sports 1", url: "https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D" },
    { name: "TNT Sports 2", url: "https://embed.crichd.tech/embed.php?id=TNTSports2%255BUK%255D" },
    { name: "TNT Sports 3", url: "https://embed.crichd.tech/embed.php?id=TNTSports3%255BUK%255D" },
    { name: "Fox Sports 1", url: "https://embed.crichd.tech/embed.php?id=FOXSports1%255BUSA%255D" },
    { name: "Ziggo Sport", url: "https://embed.crichd.tech/embed.php?id=ZiggoSport%255BNetherlands%255D" }
];

const container = document.getElementById("channels");

channels.forEach((ch, i) => {
    container.innerHTML += `
        <div class="card">
            <div class="card-header">
                <h2>${ch.name}</h2>
                <button class="refresh-btn" onclick="refreshFrame(${i})">⟳</button>
            </div>

            <div class="player">
                <iframe id="frame-${i}" data-src="${ch.url}" allowfullscreen></iframe>

                <div class="overlay" id="overlay-${i}" onclick="playStream(${i})">
                    <div class="play-btn">▶ Play</div>
                </div>
            </div>
        </div>
    `;
});

function playStream(index) {
    const frame = document.getElementById(`frame-${index}`);
    const overlay = document.getElementById(`overlay-${index}`);

    frame.src = frame.dataset.src;
    overlay.style.display = "none";
}

function refreshFrame(index) {
    const frame = document.getElementById(`frame-${index}`);
    if (frame.src) {
        frame.src = frame.src;
    }
}
</script>

</body>
</html>
