<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOZALI STREAM</title>

<style>
body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: sans-serif;
    padding: 15px;
    text-align: center;
}

.card {
    background: #1a1a1a;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 12px;
}

.player {
    position: relative;
    width: 100%;
    padding-bottom: 70%;
    background: black;
    border-radius: 8px;
    overflow: hidden;
}

.player iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 0;
    top: 0;
    left: 0;
}

/* overlay */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 2;
}

/* tombol */
.play-btn {
    background: #00ffcc;
    padding: 12px 20px;
    border-radius: 50px;
    color: black;
    font-weight: bold;
}

.refresh-btn {
    margin-top: 10px;
    background: #00d1ff;
    border: none;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
}

@media(max-width:600px){
    .player { padding-bottom: 75%; }
}
</style>

<script>
function playStream(btn, url) {
    let player = btn.parentElement;
    let iframe = player.querySelector("iframe");

    iframe.src = url;
    player.setAttribute("data-src", url);

    btn.style.display = "none"; // hilangkan overlay
}

function refreshStream(btn) {
    let player = btn.parentElement.querySelector(".player");
    let iframe = player.querySelector("iframe");
    let url = player.getAttribute("data-src");

    if (!url) {
        alert("Klik PLAY dulu!");
        return;
    }

    iframe.src = url; // reload iframe
}
</script>

</head>

<body>

<h1>GOZALI STREAM</h1>

<!-- LIVE TEMPLATE -->
<div class="card">
    <h3>LIVE 1 - TNT Sports 1</h3>
    <div class="player" data-src="">
        <iframe></iframe>
        <div class="overlay" onclick="playStream(this, 'https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D')">
            <div class="play-btn">▶ PLAY</div>
        </div>
    </div>
    <button class="refresh-btn" onclick="refreshStream(this)">🔄 Refresh</button>
</div>
