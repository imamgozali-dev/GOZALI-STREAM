<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOZALI STREAM</title>

<style>
body {
    background-color: #0d0d0d;
    color: #e0e0e0;
    font-family: Arial;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #00ffcc;
    margin-bottom: 30px;
}

/* CARD */
.card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 15px;
    margin: 20px auto;
    max-width: 900px;
    overflow: hidden;
}

/* PLAYER FIX (ANTI KELUAR FRAME) */
.player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 10px;
    background: black;
}

.player iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

/* OVERLAY PLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.play-btn {
    background: #00ffcc;
    color: black;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: bold;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.refresh-btn {
    background: #00d1ff;
}
</style>
</head>

<body>

<h1>GOZALI STREAM</h1>

<div id="stream-container"></div>

<!-- DATA CHANNEL -->
<script>
const channels = [
  {
    name: "TNT Sports 1",
    url: "https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D"
  },
  {
    name: "TNT Sports 2",
    url: "https://embed.crichd.tech/embed.php?id=TNTSports2%255BUK%255D"
  },
  {
    name: "TNT Sports 3",
    url: "https://embed.crichd.tech/embed.php?id=TNTSports3%255BUK%255D"
  },
  {
    name: "Fox Sports 1",
    url: "https://embed.crichd.tech/embed.php?id=FOXSports1%255BUSA%255D"
  },
  {
    name: "DAZN Netherlands",
    url: "https://embed.crichd.tech/embed.php?id=ZiggoSport%255BNetherlands%255D"
  }
];
</script>

<!-- GENERATE -->
<script>
const container = document.getElementById("stream-container");

channels.forEach((ch, i) => {
  container.innerHTML += `
    <div class="card">
      <h2>LIVE ${i+1} - ${ch.name}</h2>

      <div class="player" data-src="">
        <iframe loading="lazy" referrerpolicy="no-referrer"></iframe>

        <div class="overlay" onclick="playStream(this, '${ch.url}')">
          <div class="play-btn">▶ PLAY</div>
        </div>
      </div>

      <button class="refresh-btn" onclick="refreshStream(this)">🔄 Refresh</button>
    </div>
  `;
});
</script>

<!-- SCRIPT -->
<script>
function playStream(btn, url) {
    let player = btn.parentElement;
    let iframe = player.querySelector("iframe");

    iframe.src = url;
    player.setAttribute("data-src", url);

    btn.style.display = "none";
}

function refreshStream(btn) {
    let player = btn.parentElement.querySelector(".player");
    let iframe = player.querySelector("iframe");
    let url = player.getAttribute("data-src");

    if (!url) {
        alert("Klik PLAY dulu!");
        return;
    }

    iframe.src = url;
}
</script>

</body>
</html>
