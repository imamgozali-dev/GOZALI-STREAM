<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMAH GOZALI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'Inter', sans-serif; background:#000; color:#fff; overflow-x:hidden; }
.header { font-size:1.3rem; font-weight:700; margin-bottom:20px; color:#e50914; letter-spacing:1px; text-align:center; text-transform:uppercase; }

/* SLIDER */
.slider-container {
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  display: flex;
  width: 100%;
}
.slider-container::-webkit-scrollbar { display:none; }

.slide {
  scroll-snap-align: start;
  flex: 0 0 100%;
  padding:15px;
  display: grid;
  grid-template-columns: 1fr;
  gap:15px;
}
@media(min-width:768px){ .slide { grid-template-columns: 1fr 1fr; } }

/* CARD */
.card { background:#111; border-radius:10px; padding:10px; transition: transform 0.25s ease, box-shadow 0.25s ease; }
@media(hover:hover){ .card:hover { transform:scale(1.03); box-shadow:0 10px 25px rgba(0,0,0,0.8); } }
.card:active { transform:scale(0.97); }
.card-header { display:flex; justify-content:space-between; align-items:center; }
.card h2 { font-size:0.85rem; color:#bbb; }
.refresh-btn { background:transparent; border:none; color:#aaa; font-size:0.9rem; cursor:pointer; }

/* PLAYER */
.player { position:relative; width:100%; aspect-ratio:16/9; border-radius:8px; overflow:hidden; background:black; margin-top:6px; }
.player iframe { width:100%; height:100%; border:0; }

/* OVERLAY PLAY */
.overlay { position:absolute; inset:0; background:rgba(0,0,0,0.75); display:flex; justify-content:center; align-items:center; cursor:pointer; transition:0.3s; }
.overlay:hover { background:rgba(0,0,0,0.5); }
.play-btn { background:#e50914; padding:10px 20px; border-radius:6px; font-weight:500; font-size:0.85rem; transition:0.2s; }
@media(hover:hover){ .play-btn:hover{ transform:scale(1.1); background:#ff1a1a; } }
.play-btn:active{ transform:scale(0.95); }
</style>
</head>

<body>

<div class="header">RUMAH GOZALI</div>

<div class="slider-container" id="sliderContainer">
  <!-- SLIDE 1: 5 CHANNEL UTAMA -->
  <div class="slide" id="slide0"></div>

  <!-- SLIDE 2: 5 CHANNEL FAVORIT -->
  <div class="slide" id="slide1"></div>
</div>

<script>
const slide0Channels = [
  { name: "TNT Sports 1", url: "https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D" },
  { name: "TNT Sports 2", url: "https://embed.crichd.tech/embed.php?id=TNTSports2%255BUK%255D" },
  { name: "TNT Sports 3", url: "https://embed.crichd.tech/embed.php?id=TNTSports3%255BUK%255D" },
  { name: "Fox Sports 1", url: "https://embed.crichd.tech/embed.php?id=FOXSports1%255BUSA%255D" },
  { name: "Ziggo Sport", url: "https://embed.crichd.tech/embed.php?id=ZiggoSport%255BNetherlands%255D" }
];

const slide1Channels = [
  { name: "Channel Favorit 1", url: "https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D" },
  { name: "Channel Favorit 2", url: "https://embed.crichd.tech/embed.php?id=FOXSports1%255BUSA%255D" },
  { name: "Channel Favorit 3", url: "https://embed.crichd.tech/embed.php?id=ZiggoSport%255BNetherlands%255D" },
  { name: "Channel Favorit 4", url: "https://embed.crichd.tech/embed.php?id=TNTSports2%255BUK%255D" },
  { name: "Channel Favorit 5", url: "https://embed.crichd.tech/embed.php?id=TNTSports3%255BUK%255D" }
];

function createChannelCards(slideId, channels){
  const container = document.getElementById(slideId);
  channels.forEach((ch,i)=>{
    container.innerHTML += `
      <div class="card">
        <div class="card-header">
          <h2>${ch.name}</h2>
          <button class="refresh-btn" onclick="refreshFrame('${slideId}-${i}')">⟳</button>
        </div>
        <div class="player">
          <iframe id="${slideId}-${i}" data-src="${ch.url}" allowfullscreen></iframe>
          <div class="overlay" onclick="playStream('${slideId}-${i}', this)">
            <div class="play-btn">▶ Play</div>
          </div>
        </div>
      </div>
    `;
  });
}

createChannelCards("slide0", slide0Channels);
createChannelCards("slide1", slide1Channels);

function playStream(id, overlay){
  const frame = document.getElementById(id);
  frame.src = frame.dataset.src;
  overlay.style.display = "none";
}

function refreshFrame(id){
  const frame = document.getElementById(id);
  if(frame.src){ frame.src = frame.src; }
}
</script>

</body>
</html>
