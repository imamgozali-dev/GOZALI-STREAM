<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMAH GOZALI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:#0d0d0d; color:#fff; }

/* HEADER */
.header {
  font-family:'Bebas Neue';
  font-size:2rem;
  color:#E50914;
  text-align:center;
  margin:20px 0 10px;
}

/* DOT INDICATOR */
.dots {
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
}
.dot {
  width:10px;
  height:10px;
  border-radius:50%;
  background:#555;
  cursor:pointer;
  transition:0.3s;
  opacity:0.5;
}
.dot.active {
  background:#E50914;
  transform:scale(1.3);
  opacity:1;
}

/* SLIDER */
.slider-container {
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
}
.slider-container::-webkit-scrollbar { display:none; }

.slide {
  flex:0 0 100%;
  scroll-snap-align:start;
  padding:10px;
  display:grid;
  gap:10px;
}
@media(min-width:768px){
  .slide { grid-template-columns:1fr 1fr; }
}

/* CARD */
.card {
  background:#111;
  border-radius:8px;
  padding:6px;
}
.card-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:4px;
}
.card h2 {
  font-family:'Bebas Neue';
  font-size:0.85rem;
}

/* REFRESH BUTTON */
.refresh-btn {
  background:rgba(255,255,255,0.1);
  border:none;
  padding:5px;
  border-radius:50%;
  cursor:pointer;
}
.refresh-btn:active {
  transform:scale(0.9);
}

/* PLAYER */
.player {
  position:relative;
  width:100%;
  padding-top:56.25%;
  background:black;
  overflow:hidden;
  border-radius:6px;
}

.player iframe {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:2;
}
.play-btn {
  background:#E50914;
  padding:10px 20px;
  border-radius:5px;
}

/* SPINNER */
.spinner {
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3;
}
.spinner:after {
  content:"";
  width:28px;
  height:28px;
  border:4px solid #fff;
  border-top-color:red;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

<body>

<div class="header">RUMAH GOZALI</div>
<div class="dots" id="dots"></div>

<div class="slider-container" id="sliderContainer"></div>

<script>

// DATA CHANNEL
const channelGroups = [
  {
    name:"LIVE EVENT",
    channels:[
      { name:"MOTO GP", url:"https://embedsports.top/embed/delta/live-event_motogp-2026-grand-prix-of-the-americas-live-stream/1" },
      { name:"USA V BELGIUM", url:"https://w2.sportzsonline.click/channels/hd/hd4.php" },
      { name:"F1", url:"https://embed.crichd.tech/embed.php?id=SkySportsF1%255BUK%255D" },
      { name:"MOTO GP V2", url:"https://w2.sportzsonline.click/channels/hd/hd1.php" },
      { name:"ENGLAND V URUGUAY", url:"https://w2.sportzsonline.click/channels/pt/sporttv1.php" }
    ]
  },
  {
    name:"SPORT CHANNEL",
    channels:[
      { name:"TNT 1", url:"https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D" },
      { name:"TNT 2", url:"https://embed.crichd.tech/embed.php?id=TNTSports2%255BUK%255D" },
      { name:"TNT 3", url:"https://embed.crichd.tech/embed.php?id=TNTSports3%255BUK%255D" },
      { name:"TNT 4", url:"https://embed.crichd.tech/embed.php?id=TNTSports4%255BUK%255D" },
      { name:"Ziggo Sport 1", url:"https://embed.crichd.tech/embed.php?id=ZiggoSport%255BNetherlands%255D" },
      { name:"Fox Sport 1", url:"https://embed.crichd.tech/embed.php?id=FOXSports1%255BUSA%255D" },
      { name:"Ziggo Sport 3", url:"https://embed.crichd.tech/embed.php?id=ZiggoSport3%255BNetherlands%255D" },
      { name:"Bein 1 Arabic", url:"https://embed.crichd.tech/embed.php?id=BeinSports1%255BArab%255D" }
    ]
  }
];

// INIT
const container = document.getElementById("sliderContainer");
const dotsContainer = document.getElementById("dots");

// RENDER
channelGroups.forEach((group,idx)=>{
  const slide=document.createElement("div");
  slide.className="slide";

  group.channels.forEach((ch,i)=>{
    slide.innerHTML+=`
    <div class="card">
      <div class="card-header">
        <h2>${ch.name}</h2>
        <button class="refresh-btn" onclick="refreshFrame('${idx}-${i}')">⟳</button>
      </div>

      <div class="player">
        <iframe 
          id="${idx}-${i}" 
          data-src="${ch.url}"
          allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
          allowfullscreen>
        </iframe>

        <div class="overlay" onclick="playStream('${idx}-${i}',this)">
          <div class="play-btn">▶ Play</div>
        </div>

        <div class="spinner" id="sp-${idx}-${i}"></div>
      </div>
    </div>`;
  });

  container.appendChild(slide);

  // DOT
  const dot=document.createElement("div");
  dot.className="dot";
  if(idx===0) dot.classList.add("active");

  dot.onclick=()=>{
    container.scrollTo({
      left: container.clientWidth * idx,
      behavior:"smooth"
    });
  };

  dotsContainer.appendChild(dot);
});

// SCROLL DETECT
container.addEventListener("scroll", ()=>{
  const index=Math.round(container.scrollLeft / container.clientWidth);

  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i===index);
  });
});

// PLAY
function playStream(id,overlay){
  const frame=document.getElementById(id);
  const spin=document.getElementById("sp-"+id);
  const url=frame.dataset.src;

  if(!url){
    alert("⚠️ STREAM BELUM TERSEDIA");
    return;
  }

  spin.style.display="flex";
  frame.src=url;
  frame.onload=()=>spin.style.display="none";

  overlay.style.display="none";
}

// REFRESH
function refreshFrame(id){
  const f=document.getElementById(id);
  if(!f.src) return;
  f.src=f.src;
}

</script>

</body>
</html>
