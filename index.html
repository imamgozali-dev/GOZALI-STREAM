<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOZALI STREAM</title>
<style>
/* General Body */
body {
    background-color: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
}

/* Header */
h1 {
    color: #00ffcc;
    font-size: 2.5rem;
    margin-bottom: 40px;
    text-shadow: 0 0 8px #00ffcc;
}

/* Live Title */
h2 {
    color: #00d1ff;
    font-size: 1.5rem;
    margin-bottom: 15px;
}

/* Card Container */
.card {
    background-color: #1a1a1a;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 40px;
    max-width: 950px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
}

/* Responsive iframe 16:9 */
.responsive-iframe {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 ratio */
    height: 0;
    overflow: hidden;
    border-radius: 8px;
}

.responsive-iframe iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
    border-radius: 8px;
}

/* Mobile adjustments */
@media (max-width: 600px) {
    h1 { font-size: 2rem; }
    h2 { font-size: 1.3rem; }
}
</style>
</head>
<body>

<h1>GOZALI STREAM</h1>

<div class="card">
    <h2>LIVE 1</h2>
    <div class="responsive-iframe">
        <iframe src="https://daddylive.cv/embed/stream.php?id=427&player=2&source=tv.json&autoplay=0"
                allow="fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen webkitallowfullscreen mozallowfullscreen>
        </iframe>
    </div>
</div>

<div class="card">
    <h2>LIVE 2</h2>
    <div class="responsive-iframe">
        <iframe src="https://daddylive.cv/embed/stream.php?id=313&player=1&source=tv.json&autoplay=0"
                allow="fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen webkitallowfullscreen mozallowfullscreen>
        </iframe>
    </div>
</div>

<div class="card">
    <h2>LIVE 3</h2>
    <div class="responsive-iframe">
        <iframe src="https://daddylive.cv/embed/stream.php?id=398&player=2&source=tv.json&autoplay=0"
                allow="fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen webkitallowfullscreen mozallowfullscreen>
        </iframe>
    </div>
</div>

</body>
</html>
