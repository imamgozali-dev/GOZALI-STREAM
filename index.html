<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMAH GOZALI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:#0d0d0d; color:#fff; }

/* HEADER */
.header {
  font-family:'Bebas Neue';
  font-size:clamp(2rem,5vw,4rem);
  color:#E50914;
  text-align:center;
  margin:30px 0 20px;
  letter-spacing:4px;
}

/* DOT */
.dots {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}
.dot {
  width:10px;
  height:10px;
  border-radius:50%;
  background:#555;
  cursor:pointer;
  opacity:0.5;
  transition:0.3s;
}
.dot.active {
  background:#E50914;
  transform:scale(1.3);
  opacity:1;
}

/* SLIDER */
.slider-container {
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
}
.slider-container::-webkit-scrollbar { display:none; }

.slide {
  flex:0 0 100%;
  scroll-snap-align:start;
  padding:15px;
  display:grid;
  gap:15px;
}
@media(min-width:768px){
  .slide { grid-template-columns:1fr 1fr; }
}

/* CARD */
.card {
  background:#111;
  border-radius:12px;
  padding:10px;
}

.card-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.card h2 {
  font-family:'Bebas Neue';
  font-size:clamp(1rem,1.2vw,1.4rem);
  letter-spacing:1px;
}

/* REFRESH */
.refresh-btn {
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.08);
  border:none;
  border-radius:50%;
  cursor:pointer;
  color:#fff;
  font-size:14px;
  transition:0.2s;
}
.refresh-btn:hover {
  background:#E50914;
  transform:rotate(90deg);
}

/* PLAYER */
.player {
  position:relative;
  width:100%;
  padding-top:56.25%;
  background:black;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.player iframe {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:2;
}
.play-btn {
  background:#E50914;
  padding:10px 20px;
  border-radius:6px;
}

/* COMING SOON */
.coming {
  background:rgba(0,0,0,0.85);
  color:#aaa;
  font-family:'Bebas Neue';
  font-size:1.2rem;
  letter-spacing:2px;
}

/* SPINNER */
.spinner {
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3;
}
.spinner:after {
  content:"";
  width:30px;
  height:30px;
  border:4px solid #fff;
  border-top-color:red;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

</style>
</head>

<body>

<div class="header">RUMAH GOZALI</div>
<div class="dots" id="dots"></div>
<div class="slider-container" id="sliderContainer"></div>

<script>

// DATA
const channelGroups = [
{
name:"LIVE EVENT",
channels:[
{ name:"", url:""},
{ name:"", url:""},
{ name:"", url:""},
{ name:"", url:""},
{ name:"", url:""},
{ name:"", url:""},
{ name:"", url:""},
{ name:"", url:""}
]
},
{
name:"SPORT CHANNEL",
channels:[
{ name:"TNT 1", url:"https://embed.crichd.tech/embed.php?id=TNTSports1%255BUK%255D"},
{ name:"TNT 2", url:"https://embed.crichd.tech/embed.php?id=TNTSports2%255BUK%255D"},
{ name:"TNT 3", url:"https://embed.crichd.tech/embed.php?id=TNTSports3%255BUK%255D"},
{ name:"TNT 4", url:"https://embed.crichd.tech/embed.php?id=TNTSports4%255BUK%255D"},
{ name:"Ziggo Sport 1", url:"https://embed.crichd.tech/embed.php?id=ZiggoSport%255BNetherlands%255D"},
{ name:"Fox Sport 1", url:"https://embed.crichd.tech/embed.php?id=FOXSports1%255BUSA%255D"},
{ name:"Ziggo Sport 3", url:"https://embed.crichd.tech/embed.php?id=ZiggoSport3%255BNetherlands%255D"},
{ name:"Bein 1 Arabic", url:"https://embed.crichd.tech/embed.php?id=BeinSports1%255BArab%255D"}
]
}
];

// INIT
const container = document.getElementById("sliderContainer");
const dotsContainer = document.getElementById("dots");

// RENDER
channelGroups.forEach((group,idx)=>{
  const slide=document.createElement("div");
  slide.className="slide";

  group.channels.forEach((ch,i)=>{

    const isEmpty = !ch.url;

    slide.innerHTML+=`
    <div class="card">
      <div class="card-header">
        <h2>${ch.name}</h2>
        <button class="refresh-btn" onclick="refreshFrame('${idx}-${i}')">⟳</button>
      </div>

      <div class="player">
        <iframe id="${idx}-${i}" data-src="${ch.url}"></iframe>

        <div class="overlay ${isEmpty ? 'coming' : ''}"
             ${isEmpty ? '' : `onclick="playStream('${idx}-${i}',this)"`}>

          ${isEmpty 
            ? `<div>COMING SOON</div>` 
            : `<div class="play-btn">▶ Play</div>`}

        </div>

        <div class="spinner" id="sp-${idx}-${i}"></div>
      </div>
    </div>`;
  });

  container.appendChild(slide);

  const dot=document.createElement("div");
  dot.className="dot";
  if(idx===0) dot.classList.add("active");

  dot.onclick=()=>{
    container.scrollTo({
      left: container.clientWidth * idx,
      behavior:"smooth"
    });
  };

  dotsContainer.appendChild(dot);
});

// SCROLL
container.addEventListener("scroll", ()=>{
  const index=Math.round(container.scrollLeft / container.clientWidth);
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i===index);
  });
});

// PLAY
function playStream(id,overlay){
  const frame=document.getElementById(id);
  const spin=document.getElementById("sp-"+id);

  spin.style.display="flex";
  frame.src=frame.dataset.src;
  frame.onload=()=>spin.style.display="none";

  overlay.style.display="none";
}

// REFRESH
function refreshFrame(id){
  const f=document.getElementById(id);
  if(!f.src) return;
  f.src=f.src;
}

</script>

</body>
</html>
