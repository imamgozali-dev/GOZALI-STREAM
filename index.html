<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOZALI STREAM</title>

<style>
body {
    background-color: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 15px;
    text-align: center;
}

h1 {
    color: #00ffcc;
    font-size: 2.2rem;
    margin-bottom: 30px;
    text-shadow: 0 0 8px #00ffcc;
}

h2 {
    color: #00d1ff;
    font-size: 1.3rem;
    margin-bottom: 10px;
}

.card {
    background-color: #1a1a1a;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 25px;
    max-width: 950px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
}

/* RESPONSIVE IFRAME FIX */
.responsive-iframe {
    position: relative;
    width: 100%;
    padding-bottom: 70%; /* lebih tinggi biar tidak kepotong di HP */
    height: 0;
    overflow: hidden;
    border-radius: 8px;
}

.responsive-iframe iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 102%;
    height: 102%;
    border: 0;
    border-radius: 8px;

    /* fix iframe bandel */
    transform: scale(0.98);
    transform-origin: top left;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 600px) {
    h1 { font-size: 1.8rem; }
    h2 { font-size: 1.2rem; }

    .responsive-iframe {
        padding-bottom: 75%;
    }
}
</style>
</head>

<body>

<h1>GOZALI STREAM</h1>

<!-- LIVE 1 -->
<div class="card">
    <h2>LIVE 1</h2>
    <div class="responsive-iframe">
        <iframe src="https://daddylive.cv/embed/stream.php?id=427&player=2&source=tv.json&autoplay=0"
        allow="fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<!-- LIVE 2 -->
<div class="card">
    <h2>LIVE 2</h2>
    <div class="responsive-iframe">
        <iframe src="https://daddylive.cv/embed/stream.php?id=39&player=2&source=tv.json&autoplay=0"
        allow="fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<!-- LIVE 3 -->
<div class="card">
    <h2>LIVE 3 TNT 3</h2>
    <div class="responsive-iframe">
        <iframe src="https://daddylive.cv/embed/stream.php?id=33&player=2&source=tv.json&autoplay=0"
        allow="fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<!-- LIVE 4 -->

        allow="fullscreen *; picture-in-picture *; encrypted-media" allowfullscreen></iframe>

</body>
</html>
